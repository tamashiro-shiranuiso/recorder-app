<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レコーダーアプリ</title>
    <style>
        /* ==========================================
           🎨 ベース設定 ＆ レイアウト
           ========================================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #495057;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
        }

        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            min-height: 100dvh;
            padding: 40px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
        }

        @media (min-width: 500px) {
            .app-container {
                min-height: auto;
                height: 90vh;
                border-radius: 32px;
                overflow-y: auto;
            }
        }

        /* ==========================================
           🎨 ヘッダー ＆ ボタン
           ========================================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h2 {
            margin: 0;
            font-size: 24px;
            color: #212529;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .header-actions { display: flex; gap: 12px; align-items: center; }

        .btn-icon {
            background: #f1f3f5; border: none; width: 40px; height: 40px;
            border-radius: 50%; font-size: 18px; cursor: pointer;
            transition: all 0.2s ease; display: flex; justify-content: center; align-items: center;
        }
        .btn-icon:hover { background: #e9ecef; transform: scale(1.05); }

        .btn-pill {
            background: #fff; border: 2px solid #e9ecef; padding: 8px 16px;
            border-radius: 20px; font-size: 13px; font-weight: bold; color: #495057;
            cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 6px;
        }
        .btn-pill:hover { border-color: #fab005; color: #fab005; background: #fff9db; }

        /* ==========================================
           🎨 入力フォーム ＆ 音声入力ボタン
           ========================================== */
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #868e96;
        }
        input[type="text"], select {
            width: 100%; padding: 16px; border: 2px solid #f1f3f5; border-radius: 16px;
            font-size: 16px; color: #495057; background-color: #f8f9fa;
            transition: all 0.2s ease; box-sizing: border-box; outline: none;
        }
        input[type="text"]:focus, select:focus {
            border-color: #74c0fc; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(116, 192, 252, 0.15);
        }

        .input-with-icon {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-with-icon input {
            padding-right: 50px;
        }
        .mini-mic-btn {
            position: absolute;
            right: 8px;
            background: #fff;
            border: 2px solid #f1f3f5;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #495057;
        }
        .mini-mic-btn:hover { background: #f8f9fa; border-color: #dee2e6; }
        .mini-mic-btn.listening {
            background: #fa5252;
            border-color: #fa5252;
            color: white;
            animation: pulseMini 1.5s infinite;
        }
        @keyframes pulseMini {
            0% { box-shadow: 0 0 0 0 rgba(250, 82, 82, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(250, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 82, 82, 0); }
        }

        /* ==========================================
           🎨 メイン録音エリア
           ========================================== */
        .record-area {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin: 40px 0;
        }
        .record-btn {
            width: 120px; height: 120px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #74c0fc, #4dabf7); color: white;
            font-size: 48px; cursor: pointer; box-shadow: 0 10px 20px rgba(77, 171, 247, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center;
        }
        .record-btn:active { transform: scale(0.9); }
        .record-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .record-btn.recording {
            background: linear-gradient(135deg, #ff8787, #fa5252);
            box-shadow: 0 0 0 0 rgba(250, 82, 82, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(250, 82, 82, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(250, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 82, 82, 0); }
        }

        .status-text {
            margin-top: 24px; font-size: 16px; font-weight: 600;
            color: #868e96; text-align: center; min-height: 24px;
        }

        .elapsed-time {
            margin-top: 8px; font-size: 13px; color: #adb5bd; text-align: center;
        }

        .wake-lock-warning {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: #fff9db;
            border: 1px solid #fab005;
            border-radius: 12px;
            font-size: 12px;
            color: #7c5c00;
            text-align: center;
            line-height: 1.6;
        }

        .wake-lock-note {
            margin-top: 10px;
            font-size: 11px;
            color: #adb5bd;
            text-align: center;
            line-height: 1.6;
        }
        body.recording-active .wake-lock-note {
            color: #6a6f78;
        }

        /* ==========================================
           🔋 録音中の省電力表示（ダークトーン）
           Wake Lockで画面を点灯させ続ける分、表示自体の消費電力を
           抑えるため、録音中は背景を暗いトーンに切り替える。
           有機ELディスプレイでは黒に近い表示ほど消費電力が下がるため、
           特にモバイル端末での長時間録音時に効果が期待できる。
           ========================================== */
        body.recording-active {
            background-color: #16181c;
            transition: background-color 0.4s ease;
        }
        body.recording-active .app-container {
            background-color: #1c1e22;
            color: #d0d3d8;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        body.recording-active .header h2 {
            color: #e8eaed;
        }
        body.recording-active .btn-icon,
        body.recording-active .btn-pill {
            background: #2a2d33;
            color: #d0d3d8;
            border-color: #3a3d44;
        }
        body.recording-active .input-group label {
            color: #8a8f98;
        }
        body.recording-active input[type="text"],
        body.recording-active select {
            background-color: #2a2d33;
            border-color: #3a3d44;
            color: #d0d3d8;
        }
        body.recording-active .status-text {
            color: #8a8f98;
        }
        body.recording-active .progress-container {
            background-color: #2a2d33;
        }
        body.recording-active .wake-lock-warning {
            background: #3a2f00;
            border-color: #7c5c00;
            color: #ffd43b;
        }

        /* ==========================================
           🌑 疑似スリープオーバーレイ
           実際のOSスリープはWake Lockでキャンセルし続けつつ、
           一定時間操作がなければ画面をほぼ黒くフェードさせることで、
           見た目上は消灯したように見せ、体感的な省電力感を出す。
           有機ELディスプレイでは黒表示に近いほど実消費電力も下がる。
           タップすると即座に解除される。
           ========================================== */
        .pseudo-sleep-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000000;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 2.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .pseudo-sleep-overlay.active {
            opacity: 0.97;
            pointer-events: auto;
        }
        .pseudo-sleep-overlay .sleep-indicator {
            color: #3a3d44;
            font-size: 13px;
            text-align: center;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 2.5s ease 0.5s;
        }
        .pseudo-sleep-overlay.active .sleep-indicator {
            opacity: 1;
        }
        .pseudo-sleep-overlay .sleep-rec-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #7a2020;
            margin-right: 6px;
            animation: sleepPulse 3s infinite;
        }
        @keyframes sleepPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        /* ==========================================
           🎨 進捗表示 ＆ パネル群
           ========================================== */
        .progress-container {
            display: none; background-color: #f8f9fa; padding: 24px;
            border-radius: 20px; margin-top: 20px;
        }
        .progress-title {
            font-size: 14px; font-weight: 700; color: #495057;
            margin-bottom: 16px; text-align: center;
        }
        .dots-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .dot {
            width: 18px; height: 18px; border-radius: 50%;
            background-color: #dee2e6; transition: all 0.4s ease;
        }
        .dot.processing {
            background-color: #4dabf7; box-shadow: 0 0 8px rgba(77, 171, 247, 0.6);
            animation: bounce 1s infinite alternate;
        }
        .dot.complete { background-color: #40c057; transform: scale(1.1); }
        .dot.error { background-color: #fab005; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); } }

        .recovery-panel {
            display: none; margin-top: 20px; padding: 20px;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 20px;
        }
        .recovery-panel h4 { margin: 0 0 10px 0; font-size: 15px; }
        .recovery-panel.help h4 { color: #fab005; }
        .recovery-panel.settings h4 { color: #4dabf7; }
        
        .recovery-btn {
            width: 100%; padding: 14px; margin-top: 10px;
            background-color: #fff; border: 2px solid #f1f3f5;
            border-radius: 12px; font-weight: bold; color: #495057;
            cursor: pointer; transition: all 0.2s;
        }
        .recovery-panel.help .recovery-btn:hover { border-color: #fab005; color: #fab005; }
        .recovery-panel.settings .recovery-btn:hover { border-color: #4dabf7; color: #4dabf7; background: #e7f5ff; }
        
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>🎙 レコーダー</h2>
        <div class="header-actions">
            <button class="btn-pill" title="手動で途中から再開する" id="showRecoveryBtn">
                <span>🛠</span> 手動再開
            </button>
            <button class="btn-icon" title="設定" id="settingsBtn">⚙️</button>
        </div>
    </div>

    <div class="input-group">
        <label>会議名・内容 (ファイル名)</label>
        <div class="input-with-icon">
            <input type="text" id="meetingNameInput" placeholder="例：〇〇様 担当者会議">
            <button class="mini-mic-btn" id="meetingNameMicBtn" title="音声で入力">🎙️</button>
        </div>
    </div>

    <div class="input-group">
        <label>AI処理モード</label>
        <select id="modeSelect">
            <option value="1">① 録音保存のみ</option>
            <option value="2">② 録音 ＋ AI文字起こし</option>
            <option value="3" selected>③ 録音 ＋ 文字起こし ＋ 議事録生成</option>
        </select>
    </div>

    <div class="input-group fade-in" id="templateGroup">
        <label>議事録テンプレート</label>
        <select id="templateSelect">
            <option value="汎用議事録">汎用議事録</option>
            <option value="サービス担当者会議録">サービス担当者会議録</option>
            <option value="苦情・要望等受付">苦情・要望等受付</option>
        </select>
    </div>

    <div class="record-area">
        <button class="record-btn" id="mainRecordBtn">🎤</button>
        <div class="status-text" id="statusText">タップして録音を開始</div>
        <div class="elapsed-time" id="elapsedTime"></div>
        <div class="wake-lock-warning" id="wakeLockWarning">
            ⚠️ 画面がスリープすると録音が中断される可能性があります。<br>
            録音中は端末をスリープさせないようにしてください。
        </div>
        <div class="wake-lock-note">
            ※ 録音中は、他のアプリへの切り替えや画面ロックを避け、<br>
            本アプリの画面を表示したままにしてください。
        </div>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-title" id="progressTitle">AIが音声を処理中...</div>
        <div class="dots-grid" id="dotsGrid"></div>
    </div>

    <!-- お助けモード（自動再開）パネル -->
    <!-- 🌟 変更点：リンクの手入力は廃止。保存済みsessionIdを使い、
         サーバー側の実データを根拠に自動で状態判定・再開する方式にした。 -->
    <div class="recovery-panel help" id="recoveryPanel">
        <h4>🛠 お助けモード（自動再開）</h4>
        <div id="recoveryStatusText" style="font-size: 13px; color: #868e96; line-height: 1.6; margin-bottom: 12px;">
            前回の録音状況を確認しています...
        </div>
        <button class="recovery-btn" id="recoveryActionBtn" style="display:none;"></button>
    </div>

    <!-- システム設定パネル -->
    <div class="recovery-panel settings" id="settingsPanel">
        <h4>⚙️ システム設定</h4>
        <div class="input-group" style="margin-bottom: 0;">
            <label style="font-size: 12px;">GAS ウェブアプリURL</label>
            <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
            <button class="recovery-btn" id="saveSettingsBtn">設定を保存して閉じる</button>
        </div>
    </div>
</div>

<!-- 🌑 疑似スリープオーバーレイ：録音中、一定時間操作がないと表示される -->
<div class="pseudo-sleep-overlay" id="pseudoSleepOverlay">
    <div class="sleep-indicator">
        <span class="sleep-rec-dot"></span>録音中<br>
        <span id="sleepOverlayElapsed"></span><br>
        画面をタップすると表示が戻ります
    </div>
</div>

<!-- キャッシュ強制回避用のバージョン記述を追加(v=4.0 音声優先確定対応版) -->
<script src="js/recorder-controller.js?v=4.0"></script>

<script>
    // ==========================================
    // 🔧 設定と状態管理
    // ==========================================
    // 🛠 2時間超対応版（逐次アップロード方式）：
    //   ・従来のtimeslice方式（1個のMediaRecorderをtimesliceで区切る）は
    //     廃止した。最初のチャンクだけが正しいWebMヘッダーを持ち、
    //     2個目以降はヘッダーなしの断片になるという構造的な問題があり、
    //     これがGeminiの誤った文字起こし（重複・文脈破綻）の原因だった。
    //   ・新方式：SEGMENT_INTERVAL_MSごとに、MediaRecorderを
    //     「完全停止→即座に新しいインスタンスで再開」する。
    //     stop()時にondataavailableが1回だけ発火し、それが「正しい
    //     ヘッダーを持つ、完全で独立した1本のWebMファイル」になる。
    //   ・確定した各セグメントは、Drive保存（appendAudioChunk）と
    //     Geminiアップロード（uploadChunkToGeminiAndStore）の両方に、
    //     非同期で並行して送信される。
    //   ・切り替え時に生じる一瞬の録音の途切れ（数百ミリ秒程度）は、
    //     文字起こし側のプロンプトで「ファイル境界での自然な補完」を
    //     指示することで、実用上の影響を抑えている。
    const APP_CONFIG = {
        SEGMENT_INTERVAL_MS: 600000, // 本番運用: 10分（テストする場合は短い値に変更してください）
        PSEUDO_SLEEP_DELAY_MS: 15000 // 🌟 追加：録音中、操作がないままこの時間が経つと疑似スリープ表示になる
    };

    const AppState = {
        isRecording: false,
        isStopping: false,
        // 🌟 変更点（2時間超対応）：recorderは「現在進行中のセグメント」の
        //   MediaRecorderインスタンスを指す。SEGMENT_INTERVAL_MSごとに
        //   完全停止→新しいインスタンスに差し替えられる（使い捨て）。
        recorder: null,
        globalStream: null,
        chunkIndex: 0,              // セグメント（10分単位）の通し番号
        mimeType: 'audio/webm',
        recordingStartedAt: null,
        elapsedTimerId: null,
        wakeLock: null,              // 🌟 追加：画面スリープ防止用のWake Lockオブジェクト
        wakeLockSupported: 'wakeLock' in navigator,  // 🌟 追加：端末がWake Lock APIに対応しているか
        pseudoSleepTimerId: null,    // 🌟 追加：疑似スリープ発動までの無操作タイマー
        isPseudoSleeping: false,     // 🌟 追加：現在疑似スリープ表示中かどうか
        // 🌟 追加：appendAudioChunk / uploadChunkToGeminiAndStore の送信を
        //   順番通りに実行するためのキュー（各セグメント確定のたびに繋げる）
        audioSendQueue: Promise.resolve(),
        // 🌟 新設（2時間超対応）：次のセグメント切り替えを予約するタイマーID。
        //   stopRecordingAndProcess側で確実にクリアする必要がある。
        segmentTimerId: null,
        // 🌟 新設（2時間超対応）：ユーザーが「録音終了」を押したかどうかを示す
        //   フラグ。セグメントのonstopハンドラ内で「次のセグメントを
        //   自動的に開始すべきか」を判定するために使う。
        isSegmentCycleActive: false
    };

    const UI = {
        modeSelect: document.getElementById('modeSelect'),
        templateGroup: document.getElementById('templateGroup'),
        meetingNameInput: document.getElementById('meetingNameInput'),
        meetingNameMicBtn: document.getElementById('meetingNameMicBtn'),
        templateSelect: document.getElementById('templateSelect'),
        mainRecordBtn: document.getElementById('mainRecordBtn'),
        statusText: document.getElementById('statusText'),
        elapsedTime: document.getElementById('elapsedTime'),
        wakeLockWarning: document.getElementById('wakeLockWarning'),
        pseudoSleepOverlay: document.getElementById('pseudoSleepOverlay'),
        sleepOverlayElapsed: document.getElementById('sleepOverlayElapsed'),
        progressContainer: document.getElementById('progressContainer'),
        dotsGrid: document.getElementById('dotsGrid'),
        progressTitle: document.getElementById('progressTitle'),
        showRecoveryBtn: document.getElementById('showRecoveryBtn'),
        recoveryPanel: document.getElementById('recoveryPanel'),
        recoveryStatusText: document.getElementById('recoveryStatusText'),
        recoveryActionBtn: document.getElementById('recoveryActionBtn'),
        settingsBtn: document.getElementById('settingsBtn'),
        settingsPanel: document.getElementById('settingsPanel'),
        gasUrlInput: document.getElementById('gasUrlInput'),
        saveSettingsBtn: document.getElementById('saveSettingsBtn')
    };

    // ==========================================
    // 💡 イベントの紐付け
    // ==========================================
    function bindEvents() {
        // 会議名の音声入力
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.continuous = false;

            UI.meetingNameMicBtn.addEventListener('click', () => recognition.start());

            recognition.onstart = () => {
                UI.meetingNameMicBtn.classList.add('listening');
                UI.meetingNameInput.placeholder = "お話しください...";
                UI.meetingNameInput.value = "";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                UI.meetingNameInput.value = transcript.replace(/[。、.\s]+$/, '');
            };

            recognition.onend = () => {
                UI.meetingNameMicBtn.classList.remove('listening');
                UI.meetingNameInput.placeholder = "例：〇〇様 担当者会議";
            };

            recognition.onerror = () => {
                UI.meetingNameMicBtn.classList.remove('listening');
                UI.meetingNameInput.placeholder = "例：〇〇様 担当者会議";
            };
        } else {
            UI.meetingNameMicBtn.style.display = 'none';
        }

        // モード切替のUI制御
        UI.modeSelect.addEventListener('change', (e) => {
            if (window.appController) window.appController.state.mode = e.target.value;
            if (e.target.value === "3") {
                UI.templateGroup.style.display = "block";
                UI.templateGroup.classList.add('fade-in');
            } else {
                UI.templateGroup.style.display = "none";
            }
        });

        // パネル制御
        // 🌟 変更点（自動再開対応）：お助けモードを開いたタイミングで、
        //   保存済みsessionIdを使った自動状態確認（checkRecoveryStatus）を実行する。
        //   ユーザーはリンクやパスを入力する必要がない。
        UI.showRecoveryBtn.addEventListener('click', () => {
            UI.recoveryPanel.style.display = UI.recoveryPanel.style.display === 'block' ? 'none' : 'block';
            if(UI.recoveryPanel.style.display === 'block') {
                UI.recoveryPanel.classList.add('fade-in');
                UI.settingsPanel.style.display = 'none';
                checkRecoveryStatus();
            }
        });

        UI.settingsBtn.addEventListener('click', () => {
            UI.settingsPanel.style.display = UI.settingsPanel.style.display === 'block' ? 'none' : 'block';
            if(UI.settingsPanel.style.display === 'block') {
                UI.settingsPanel.classList.add('fade-in');
                UI.recoveryPanel.style.display = 'none';
                UI.gasUrlInput.value = window.appController ? window.appController.gasUrl : "";
            }
        });

        UI.saveSettingsBtn.addEventListener('click', () => {
            const url = UI.gasUrlInput.value.trim();
            if(url) {
                localStorage.setItem('saved_gas_url', url);
                if(window.appController) window.appController.gasUrl = url;
                alert("設定を保存しました！");
                UI.settingsPanel.style.display = 'none';
            } else {
                alert("URLを入力してください。");
            }
        });

        UI.mainRecordBtn.addEventListener('click', handleRecordButtonClick);
    }

    // ==========================================
    // 🛠 お助けモード：自動再開ロジック（案A・連番フォルダ保存方式対応）
    //
    // 🛠 設計方針：
    //   ユーザーにGoogleドライブのリンクやパスを入力させることはしない。
    //   録音時に発行され、localStorageに保存されている sessionId を使い、
    //   GAS側に「このsessionIdの音声データが見つかるか」を問い合わせ、
    //   結果を画面に明示したうえで再開する。
    //
    //   案Aでは音声を結合しないため、従来あった「音声結合が未完了」
    //   という状態区分自体がなくなった。録音中の音声は常に最初から
    //   最終的な保存場所（専用フォルダ）に置かれているため、状態は
    //   次のいずれかとして、ユーザーに分かる言葉で表示する：
    //     ・（ローカルにアップロード済みfileUriが残っている）
    //       即座に文字起こし・議事録の生成から再開できる状態
    //     ・音声は専用フォルダに保存済みだが、文字起こし・議事録の
    //       生成をやり直す必要がある状態
    //     ・再開できる前回の録音データが見つからない状態
    // ==========================================
    async function checkRecoveryStatus() {
        UI.recoveryActionBtn.style.display = "none";

        if (!window.appController || !window.appController.hasPendingSession()) {
            UI.recoveryStatusText.innerHTML =
                "再開が必要な前回の録音は見つかりませんでした。<br>" +
                "（すべて正常に完了しているか、まだ録音を行っていません）";
            return;
        }

        if (!window.appController.gasUrl) {
            UI.recoveryStatusText.innerHTML =
                "⚠️ GASのURLが設定されていないため、状態を確認できません。先に⚙️設定を行ってください。";
            return;
        }

        // ==========================================
        // 🌟 新設（2時間超対応・逐次アップロード方式）：
        //   まずローカル（localStorage）だけで判定できる情報を確認する。
        //   録音中に逐次アップロード済みのfileUriがlocalStorageに
        //   残っていれば、サーバーへの問い合わせなしで即座に
        //   「文字起こしから再開できる」ことが分かる。この経路は
        //   checkSessionStatus（Drive側の状態を問い合わせる、やや重い
        //   処理）より優先し、より高速な案内を提供する。
        // ==========================================
        if (window.appController.hasPendingGeminiFileUris()) {
            const meetingName = UI.meetingNameInput.value.trim() || "無題の会議";
            const templateType = UI.templateSelect.value;
            const uploadedCount = window.appController.state.geminiFileUris.length;

            UI.recoveryStatusText.innerHTML =
                `✨ <b>AIアップロード済みの録音データが見つかりました。</b>` +
                `（${uploadedCount}セグメント分）<br>` +
                `重い音声の再送信なしで、すぐに文字起こし・議事録の生成から再開できます。`;
            UI.recoveryActionBtn.textContent = "✨ 文字起こし・議事録の生成から再開する";
            UI.recoveryActionBtn.style.display = "block";
            UI.recoveryActionBtn.onclick = () => runRecoveryFromGeminiFileUris(meetingName, templateType);
            return;
        }

        UI.recoveryStatusText.innerHTML = "🔍 前回の録音の状態をサーバーに問い合わせています...";

        try {
            const statusResult = await window.appController.checkSessionStatus();
            renderRecoveryStatus(statusResult);
        } catch (err) {
            console.error("❌ お助けモード：状態確認に失敗しました", err);
            UI.recoveryStatusText.innerHTML =
                "⚠️ 状態の確認中にエラーが発生しました。通信環境をご確認のうえ、" +
                "もう一度「手動再開」を開き直してください。<br>詳細: " + err.message;
        }
    }

    // 🌟 変更点（案A・連番フォルダ保存方式）：
    //   従来は「音声結合が未完了(audio_pending)」という状態を持って
    //   いたが、案Aでは音声を結合しないため、この状態区分自体が
    //   なくなった。録音中の音声は常に最初から最終的な保存場所
    //   （専用フォルダ）に置かれているため、判定は
    //   「音声は保存済み(audio_saved)」か「データが見当たらない
    //   (not_found)」かのシンプルな2択になった。
    function renderRecoveryStatus(statusResult) {
        const meetingName = UI.meetingNameInput.value.trim() || "無題の会議";
        const templateType = UI.templateSelect.value;

        if (statusResult.status === "audio_saved") {
            // 🌟 音声は専用フォルダに保存済み。文字起こし・議事録の生成から再開する。
            UI.recoveryStatusText.innerHTML =
                `✅ <b>音声データは専用フォルダに保存済みです。</b>` +
                `（フォルダ名: ${statusResult.audioFileName}、ファイル数: ${statusResult.fileCount}件）<br>` +
                `🔊 音声データ自体は失われていません。<br>` +
                `文字起こし・議事録の生成から再開します。`;
            UI.recoveryActionBtn.textContent = "文字起こし・議事録の生成から再開する";
            UI.recoveryActionBtn.style.display = "block";
            UI.recoveryActionBtn.onclick = () => runRecoveryTranscriptPending(
                statusResult.audioFolderId, meetingName, templateType
            );

        } else {
            // 🌟 サーバー側にもデータが見当たらない
            UI.recoveryStatusText.innerHTML =
                "⚠️ サーバー側にも、このセッションに対応する録音データが見つかりませんでした。<br>" +
                "お手数ですが、Googleドライブの「レコーダー/音声データ」フォルダを直接ご確認ください。";
        }
    }

    // ⚠️ 非推奨（案A・連番フォルダ保存方式への移行に伴う変更）：
    //   この関数は「音声結合が未完了(audio_pending)」という状態からの
    //   再開を担っていたが、案Aでは音声を結合しないため、この状態区分
    //   自体がなくなった（renderRecoveryStatusから呼び出されなくなった）。
    //   後方互換のため関数自体は残している。
    async function runRecoveryAudioPending(meetingName, templateType) {
        UI.recoveryActionBtn.disabled = true;
        UI.recoveryStatusText.innerHTML = "🔊 音声データを1本にまとめています...";

        try {
            const audioResult = await window.appController.resumeFromAudioPending(meetingName);

            // 🌟 2時間超対応：音声結合の再開後、localStorageにfileUriが
            //   残っていれば新方式（transcribeFromGeminiFileUris）で
            //   続行する。残っていなければ、Drive上の確定済みファイルから
            //   作り直す緊急経路（transcribeFinalizedAudio）にフォールバックする。
            if (window.appController.hasPendingGeminiFileUris()) {
                UI.recoveryStatusText.innerHTML =
                    `✅ 音声データの確認が完了しました！<br>` +
                    `続けて文字起こし・議事録の生成に進みます...（数分かかることがあります）`;

                const result = await window.appController.transcribeFromGeminiFileUris(
                    meetingName, templateType
                );

                if (result) {
                    finishRecoveryUI(result);
                } else {
                    UI.recoveryStatusText.innerHTML =
                        "✅ 音声データの確認は完了しました。（文字起こしは別途「手動再開」から再度お試しください）";
                }
            } else {
                UI.recoveryStatusText.innerHTML =
                    `✅ 音声データの確認が完了しました！<br>` +
                    `AIアップロード済みのデータが見つからないため、専用フォルダ内の音声ファイルから` +
                    `文字起こしをやり直します...（音声全体をまとめて処理するため、数分かかることがあります）`;

                const result = await window.appController.transcribeFinalizedAudio(
                    meetingName, templateType
                );

                if (result) {
                    finishRecoveryUI(result);
                } else {
                    UI.recoveryStatusText.innerHTML =
                        "✅ 音声データの確認は完了しました。（文字起こしは別途「手動再開」から再度お試しください）";
                }
            }
        } catch (err) {
            console.error("❌ お助けモード：音声確認の再開に失敗しました", err);
            UI.recoveryStatusText.innerHTML =
                "⚠️ 音声データの確認に失敗しました。もう一度お試しいただくか、" +
                "Googleドライブの「レコーダー/音声データ」フォルダをご確認ください。<br>詳細: " + err.message;
        } finally {
            UI.recoveryActionBtn.disabled = false;
        }
    }

    // ==========================================
    // 🌟 新設（2時間超対応・逐次アップロード方式）：
    //   localStorageに残っているfileUri配列だけを使い、重い音声の
    //   再アップロードなしで即座に文字起こし・議事録生成から再開する。
    //   お助けモードの中で最も高速に完了する経路。
    // ==========================================
    async function runRecoveryFromGeminiFileUris(meetingName, templateType) {
        UI.recoveryActionBtn.disabled = true;
        UI.recoveryStatusText.innerHTML = "✨ アップロード済みの音声データから文字起こし中です...（数分かかることがあります）";

        try {
            const result = await window.appController.transcribeFromGeminiFileUris(
                meetingName, templateType
            );

            if (result) {
                finishRecoveryUI(result);
            } else {
                UI.recoveryStatusText.innerHTML =
                    "⚠️ 処理がスキップされました（既に処理中か、確定済みの可能性があります）。";
            }
        } catch (err) {
            console.error("❌ お助けモード：fileUriからの文字起こし再開に失敗しました", err);
            UI.recoveryStatusText.innerHTML =
                "⚠️ 文字起こし・議事録生成の再開に失敗しました。もう一度お試しください。<br>詳細: " + err.message;
        } finally {
            UI.recoveryActionBtn.disabled = false;
        }
    }

    async function runRecoveryTranscriptPending(audioFolderId, meetingName, templateType) {
        UI.recoveryActionBtn.disabled = true;
        UI.recoveryStatusText.innerHTML = "✨ 専用フォルダ内の音声データからAIが文字起こし中です...";

        try {
            // 🌟 修正：AppState.mimeTypeはページ再読み込み後は初期値
            //   （'audio/webm'）に戻ってしまっている可能性があるため、
            //   録音時にstateへ記録済みの正しい値（appController.state.mimeType）
            //   を優先して使う。
            const mimeType = window.appController.state.mimeType || AppState.mimeType;
            const result = await window.appController.resumeFromTranscriptPending(
                audioFolderId, mimeType, meetingName, templateType
            );
            finishRecoveryUI(result);
        } catch (err) {
            console.error("❌ お助けモード：文字起こしの再開に失敗しました", err);
            UI.recoveryStatusText.innerHTML =
                "⚠️ 文字起こし・議事録生成の再開に失敗しました。もう一度お試しください。<br>詳細: " + err.message;
        } finally {
            UI.recoveryActionBtn.disabled = false;
        }
    }

    function finishRecoveryUI(result) {
        UI.recoveryStatusText.innerHTML = "🎉 再開処理が完了しました！";
        UI.recoveryActionBtn.style.display = "none";

        if (result.documentUrl) {
            if (confirm("議事録の生成が完了しました！議事録ドキュメントを開きますか？")) {
                window.open(result.documentUrl, "_blank");
            }
        } else if (result.transcriptUrl) {
            if (confirm("文字起こしが完了しました！文字起こしドキュメントを開きますか？")) {
                window.open(result.transcriptUrl, "_blank");
            }
        }
    }

    // ==========================================
    // 🔆 画面スリープ防止（Wake Lock API）
    //
    // 🛠 背景：
    //   スマホ等で長時間会議を録音する場合、画面が自動消灯（スリープ）すると、
    //   ブラウザがバックグラウンド扱いになり MediaRecorder の動作が
    //   スロットリングされたり停止したりするリスクがある。
    //   Wake Lock API を使うことで、録音中は画面がスリープに入らないよう
    //   明示的にロックする。
    //
    // 🛠 変更点（音声優先確定対応）：
    //   従来はrequestWakeLock()を録音開始時、releaseWakeLock()を
    //   「録音停止直後・文字起こし開始前」に呼んでいたが、これだと
    //   「AIによる変換中」の間はWake Lockの保護対象外になっており、
    //   このフェーズでスリープすると通信が中断される問題があった。
    //   対策として、releaseWakeLock()の呼び出しタイミングを
    //   「音声の確定保存が完了した後」まで遅らせるようにした
    //   （stopRecordingAndProcess関数を参照）。
    //
    // 🔋 バッテリー消耗への配慮：
    //   Wake Lockは「画面を明るく光らせ続ける」ものではなく、あくまで
    //   「スリープ（自動消灯）させない」ためのものなので、OS側の
    //   自動輝度調整機能（暗所での減光等）は引き続き有効に働く。
    //   それでも「常時点灯」自体はバッテリーを消費するため、本アプリでは
    //   録音中の画面をあえて暗いダークトーンの配色に切り替え、
    //   表示による消費電力を抑える工夫を加えている（.recording-dark-mode参照）。
    //
    // ⚠️ 対応していない環境（一部のブラウザ・OS）や、Wake Lockが取得できな
    //   かった場合は、ユーザーに対して「スリープさせないでください」という
    //   注意喚起を表示することで補う。
    // ==========================================
    async function requestWakeLock() {
        if (!AppState.wakeLockSupported) {
            console.warn("⚠️ この端末・ブラウザはWake Lock APIに対応していません。");
            showWakeLockWarning();
            return;
        }

        try {
            AppState.wakeLock = await navigator.wakeLock.request('screen');
            console.log("🔆 Wake Lock取得成功：画面スリープを防止します。");
            hideWakeLockWarning();

            // 🌟 Wake Lockは、タブが非表示になったりOSに強制解除されたりすると
            //   自動的に失われることがある。解除されたことを検知できるようにする。
            AppState.wakeLock.addEventListener('release', () => {
                console.warn("⚠️ Wake Lockが解除されました（システムにより自動解除された可能性があります）。");
                // 録音継続中、または録音停止後の確定処理中であれば、
                // 再表示可能になったタイミングで再取得を試みる
                if (AppState.isRecording || AppState.isStopping) {
                    showWakeLockWarning();
                }
            });
        } catch (err) {
            console.warn("⚠️ Wake Lockの取得に失敗しました:", err);
            showWakeLockWarning();
        }
    }

    function releaseWakeLock() {
        if (AppState.wakeLock) {
            AppState.wakeLock.release().catch(() => {});
            AppState.wakeLock = null;
            console.log("🔆 Wake Lockを解放しました。");
        }
        hideWakeLockWarning();
    }

    // 🌟 タブが再びアクティブになった際、Wake Lockが失われていたら再取得を試みる
    //   （画面ロック解除・タブ切り替え復帰時などに有効）
    //   🛠 変更点：録音中だけでなく、録音停止後の確定処理中（isStopping）も対象に含めた。
    //     「AIによる変換中」表示のタイミングでスリープ→復帰した場合にも
    //     Wake Lockを再取得できるようにするため。
    document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible' && (AppState.isRecording || AppState.isStopping) && !AppState.wakeLock) {
            console.log("🔆 画面が再アクティブ化されました。Wake Lockの再取得を試みます。");
            await requestWakeLock();
        }
    });

    function showWakeLockWarning() {
        if (!AppState.isRecording && !AppState.isStopping) return;
        UI.wakeLockWarning.style.display = "block";
    }
    function hideWakeLockWarning() {
        UI.wakeLockWarning.style.display = "none";
    }

    // ==========================================
    // 🌑 疑似スリープ表示の制御
    //
    // 🛠 目的：
    //   Wake Lockで実際のOSスリープはキャンセルし続けている（＝画面は
    //   点灯したまま）ため、何もしないと録音中は常に明るい画面が
    //   表示され続け、バッテリーを消費する。
    //   そこで、一定時間（PSEUDO_SLEEP_DELAY_MS）操作がなければ、
    //   画面をほぼ黒いオーバーレイで覆い、見た目上は消灯したように
    //   見せる。実際のスリープには入っていないため、MediaRecorderの
    //   動作には影響しない。
    //
    // 🔆 解除：
    //   画面のどこかをタップ・クリックすれば即座に解除され、
    //   同時にタイマーがリセットされて、また無操作状態が続けば
    //   再度フェードアウトしていく。
    // ==========================================
    function resetPseudoSleepTimer() {
        if (AppState.pseudoSleepTimerId) {
            clearTimeout(AppState.pseudoSleepTimerId);
            AppState.pseudoSleepTimerId = null;
        }

        // 疑似スリープ中であれば即座に解除する
        if (AppState.isPseudoSleeping) {
            wakePseudoSleep();
        }

        // 録音中でなければタイマー自体をセットしない
        if (!AppState.isRecording) return;

        AppState.pseudoSleepTimerId = setTimeout(() => {
            enterPseudoSleep();
        }, APP_CONFIG.PSEUDO_SLEEP_DELAY_MS);
    }

    function enterPseudoSleep() {
        if (!AppState.isRecording) return;
        AppState.isPseudoSleeping = true;
        updateSleepOverlayElapsedText();
        UI.pseudoSleepOverlay.classList.add('active');
        console.log("🌑 疑似スリープ表示に入りました（実際のスリープはWake Lockで防止中）。");
    }

    function wakePseudoSleep() {
        AppState.isPseudoSleeping = false;
        UI.pseudoSleepOverlay.classList.remove('active');
    }

    function stopPseudoSleepCycle() {
        if (AppState.pseudoSleepTimerId) {
            clearTimeout(AppState.pseudoSleepTimerId);
            AppState.pseudoSleepTimerId = null;
        }
        wakePseudoSleep();
    }

    function updateSleepOverlayElapsedText() {
        if (!AppState.recordingStartedAt) return;
        const sec = Math.floor((Date.now() - AppState.recordingStartedAt) / 1000);
        const h = String(Math.floor(sec / 3600)).padStart(2, '0');
        const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        UI.sleepOverlayElapsed.textContent = `${h}:${m}:${s}`;
    }

    // 🌟 画面のどこをタップ/クリックしても疑似スリープを解除し、タイマーをリセットする
    ['click', 'touchstart', 'keydown'].forEach(eventName => {
        document.addEventListener(eventName, () => {
            if (AppState.isRecording) {
                resetPseudoSleepTimer();
            }
        }, { passive: true });
    });


    async function handleRecordButtonClick() {
        if (!window.appController || !window.appController.gasUrl) {
            alert("初回設定が必要です！\n右上の「⚙️設定」ボタンから、GASウェブアプリのURLを登録してください。");
            if(UI.settingsPanel.style.display !== 'block') UI.settingsBtn.click();
            return;
        }

        if (AppState.isStopping) {
            console.warn("⚠️ 停止処理を実行中です。しばらくお待ちください。");
            return;
        }

        if (!AppState.isRecording) {
            await startRecording();
        } else {
            await stopRecordingAndProcess();
        }
    }

    async function startRecording() {
        try {
            AppState.globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            // 🌟 新しい録音セッションを開始（sessionIdを新規発行）
            if (window.appController) window.appController.startNewSession();

            AppState.isRecording = true;
            AppState.isStopping = false;
            AppState.isSegmentCycleActive = true;
            AppState.chunkIndex = 0;
            AppState.audioSendQueue = Promise.resolve();
            AppState.recordingStartedAt = Date.now();

            UI.dotsGrid.innerHTML = '';

            UI.mainRecordBtn.classList.add('recording');
            UI.mainRecordBtn.innerHTML = "⏹";
            UI.statusText.innerHTML = "🔴 録音中... (タップして終了)";
            UI.statusText.style.color = "#fa5252";
            UI.progressContainer.style.display = "none";

            // 🌟 録音中は省電力ダークトーンに切り替え（Wake Lockでの常時点灯に対する消費電力対策）
            document.body.classList.add('recording-active');

            // 🌟 画面スリープ防止を試みる（失敗した場合は警告表示で補う）
            await requestWakeLock();

            // 🌟 疑似スリープタイマーを起動（操作がないまま一定時間経つと画面を暗くする）
            resetPseudoSleepTimer();

            startElapsedTimeDisplay();

            // 端末の対応フォーマット自動判定
            let mimeType = 'audio/webm';
            if (MediaRecorder.isTypeSupported('audio/webm')) {
                mimeType = 'audio/webm';
            } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                mimeType = 'audio/mp4';
            }
            AppState.mimeType = mimeType;

            // 🌟 2時間超対応：最初のセグメントを開始する。
            //   以降のセグメント切り替えは startNewSegment 内で自律的に
            //   繰り返される（onstopハンドラから次のセグメントを起動する）。
            startNewSegment();

        } catch (err) {
            alert("マイクのアクセスが許可されませんでした。ブラウザの設定を確認してください。");
            console.error("Audio Error:", err);
        }
    }

    // ==========================================
    // 🌟 新設（2時間超対応・逐次アップロード方式）：セグメント単位の録音制御
    //
    // 🛠 目的：
    //   SEGMENT_INTERVAL_MS（10分）ごとに、MediaRecorderを「完全停止→
    //   新しいインスタンスで即座に再開」する。これにより、
    //   すべてのセグメントが「正しいヘッダーを持つ、完全で独立した
    //   1本のWebMファイル」として生成される（timeslice方式のヘッダー
    //   問題を構造的に回避する）。
    //
    // 🛡️ 自律的な繰り返し：
    //   各セグメントのonstopハンドラの中で、録音継続中
    //   （AppState.isSegmentCycleActiveがtrueの間）であれば、
    //   次のセグメントを即座に自動開始する。ユーザーが「録音終了」を
    //   押すと、このフラグがfalseになり、連鎖が自然に止まる。
    //
    // ⏱️ タイマーの実装方針：
    //   setIntervalではなく、各セグメント開始時にsetTimeoutを1回だけ
    //   予約する方式にしている。stop()の実行〜次のstart()までには
    //   若干の非同期処理（Blob確定、次インスタンス生成）が挟まるため、
    //   setIntervalで固定間隔にすると徐々にタイマーがズレる
    //   （ドリフトする）可能性がある。setTimeoutの再帰呼び出しなら、
    //   常に「直前のセグメント開始からSEGMENT_INTERVAL_MS後」という
    //   相対時間で正確に予約できる。
    // ==========================================
    function startNewSegment() {
        if (!AppState.isSegmentCycleActive) {
            console.log("🛑 セグメントサイクルが終了しているため、新しいセグメントは開始しません。");
            return;
        }

        const mimeType = AppState.mimeType;
        const options = mimeType ? { mimeType: mimeType } : {};

        // 🌟 使い捨てのMediaRecorderインスタンス。timesliceは指定しない
        //   （指定しない＝stop()が呼ばれた時に、録音開始からの全データが
        //   1個の完全なBlobとしてondataavailableで一度だけ渡される）。
        const recorder = new MediaRecorder(AppState.globalStream, options);
        AppState.recorder = recorder;

        // 🌟 このセグメントで蓄積されたBlobパーツ（通常は1個だが、
        //   ブラウザ実装によっては複数回に分かれて発火する可能性があるため
        //   念のため配列で受ける）
        let segmentBlobParts = [];

        recorder.ondataavailable = (e) => {
            if (e.data.size === 0) return;
            segmentBlobParts.push(e.data);
        };

        recorder.onstop = () => {
            const segmentIndex = AppState.chunkIndex;
            AppState.chunkIndex++;

            console.log(`🛑 セグメント${segmentIndex}の録音を停止しました。パーツ数: ${segmentBlobParts.length}`);

            if (segmentBlobParts.length > 0) {
                const segmentBlob = new Blob(segmentBlobParts, { type: mimeType });
                handleSegmentComplete(segmentBlob, mimeType, segmentIndex);
            } else {
                console.warn(`⚠️ セグメント${segmentIndex}: データが空のため、送信をスキップします。`);
            }

            // 🌟 stop()完了を待っている処理（録音終了時のwaitForRecorderToStop）
            //   があれば、ここで解決する。
            if (typeof AppState._onRecorderStopped === 'function') {
                const callback = AppState._onRecorderStopped;
                AppState._onRecorderStopped = null;
                callback();
            }

            // 🌟 録音継続中であれば、間髪入れずに次のセグメントを開始する。
            //   これにより「完全停止→即再開」の切り替えが実現する。
            if (AppState.isSegmentCycleActive) {
                startNewSegment();
            }
        };

        // 🌟 追加：セグメント単位の録音異常終了の検知（画面スリープ・OSによる強制中断等）
        recorder.onerror = (event) => {
            console.error("❌ MediaRecorderでエラーが発生しました:", event.error);
            UI.statusText.innerHTML = "⚠️ 録音が中断されました（スリープ等の可能性）。もう一度録音を開始してください。";
            UI.statusText.style.color = "#fa5252";
            AppState.isRecording = false;
            AppState.isSegmentCycleActive = false;
            if (AppState.segmentTimerId) {
                clearTimeout(AppState.segmentTimerId);
                AppState.segmentTimerId = null;
            }
            stopElapsedTimeDisplay();
            stopPseudoSleepCycle();
            releaseWakeLock();
            document.body.classList.remove('recording-active');
            UI.mainRecordBtn.classList.remove('recording');
            UI.mainRecordBtn.innerHTML = "🎤";
            UI.mainRecordBtn.disabled = false;
            alert(
                "録音が予期せず中断されました。画面スリープや他アプリへの切り替えが原因の可能性があります。\n" +
                "これまでに録音できた部分は保存されていますが、続きを録音する場合は「録音開始」を押して新しく録音を始めてください。"
            );
        };

        recorder.start();

        // 🌟 SEGMENT_INTERVAL_MS後に、このセグメントを自動的に停止するよう予約する。
        //   ユーザーが手動で「録音終了」を押した場合は、
        //   stopRecordingAndProcess側でこのタイマーをクリアしたうえで
        //   直接stop()を呼ぶため、二重停止にはならない。
        AppState.segmentTimerId = setTimeout(() => {
            if (AppState.recorder && AppState.recorder.state === "recording") {
                AppState.recorder.stop();
            }
        }, APP_CONFIG.SEGMENT_INTERVAL_MS);
    }

    // ==========================================
    // 🌟 新設（2時間超対応・逐次アップロード方式）：
    //   1セグメント（10分・完全なWebMファイル）が確定した際の処理。
    //   Drive保存（appendAudioChunk）とGeminiアップロード
    //   （uploadChunkToGeminiAndStore）を並行して非同期に行う。
    // ==========================================
    function handleSegmentComplete(segmentBlob, mimeType, segmentIndex) {
        const meetingName = UI.meetingNameInput.value.trim() || "無題の会議";

        // UIドットを追加（保存・アップロード進捗表示用）
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.id = `dot-${segmentIndex}`;
        UI.dotsGrid.appendChild(dot);

        // 🌟 送信順序を保証するため、キューに繋げて順番に処理する
        AppState.audioSendQueue = AppState.audioSendQueue.then(async () => {
            const base64 = await blobToBase64(segmentBlob);

            // 🌟 Drive保存とGeminiアップロードは、目的が異なる独立した処理のため、
            //   互いの成否に関わらず両方とも実行する（Promise.allSettled）。
            //   片方が失敗しても、もう片方の処理まで止めないようにするため。
            const results = await Promise.allSettled([
                window.appController
                    ? window.appController.appendAudioChunk(base64, mimeType, meetingName, segmentIndex)
                    : Promise.resolve(false),
                window.appController
                    ? window.appController.uploadChunkToGeminiAndStore(base64, mimeType, segmentIndex)
                    : Promise.resolve(false)
            ]);

            const driveOk = results[0].status === 'fulfilled' && results[0].value === true;
            const geminiOk = results[1].status === 'fulfilled' && results[1].value === true;

            const dotEl = document.getElementById(`dot-${segmentIndex}`);
            if (dotEl) {
                // 🌟 文字起こしへの影響が大きいGemini側の成否を優先して表示する。
                //   Drive側だけ失敗した場合は「complete」のまま
                //   （原本バックアップの欠損はaudioWarningで別途警告されるため）。
                if (geminiOk) {
                    dotEl.classList.add('complete');
                } else {
                    dotEl.classList.add('error');
                }
            }

            if (!driveOk) {
                console.warn(`⚠️ セグメント${segmentIndex}: Drive保存に失敗しました（音声原本バックアップに影響）。`);
            }
            if (!geminiOk) {
                console.warn(`⚠️ セグメント${segmentIndex}: Geminiアップロードに失敗しました（文字起こしに影響）。`);
            }
        }).catch(err => {
            console.error("❌ セグメント処理中に予期しないエラー:", err);
            const dotEl = document.getElementById(`dot-${segmentIndex}`);
            if (dotEl) {
                dotEl.classList.add('error');
            }
        });
    }



    // ==========================================
    // 🌟 変更点（2時間超対応・逐次アップロード方式）：
    //   録音停止後の処理を、
    //     ① セグメントサイクルの停止（最後のセグメントを確定）
    //     ② Drive音声結合（finalizeAudio）と
    //        Gemini文字起こし（transcribeFromGeminiFileUris）を並行実行
    //     ③ 議事録生成
    //   という流れに変更した。
    //
    //   ねらい：
    //   従来（音声優先確定対応）は「音声結合→文字起こし」を直列で行って
    //   いたが、2時間超対応版では文字起こしに必要なfileUriは録音中に
    //   既にGeminiへアップロード済みのため、Drive側の音声結合を待つ
    //   理由がなくなった。両者は完全に独立した処理のため、並行実行
    //   することでユーザーの待ち時間を短縮する。
    //   なお「音声（Drive原本）は必ず確保される」という当初の最優先方針は、
    //   Drive保存が録音中の逐次appendAudioChunkの時点で既にほぼ完了して
    //   いるため、この並行実行によって損なわれることはない。
    //
    //   Wake Lockの解放（releaseWakeLock）は、従来通り「両方の処理が
    //   終わった後」まで維持する。これにより、「AIによる変換中」表示中に
    //   スマホがスリープしてしまうリスクを引き続き抑える。
    // ==========================================
    async function stopRecordingAndProcess() {
        if (AppState.isStopping) return;
        AppState.isStopping = true;
        AppState.isRecording = false;
        // 🌟 これ以降、セグメントのonstopハンドラは「次のセグメントを
        //   自動開始しない」（連鎖を止める）。
        AppState.isSegmentCycleActive = false;

        // 🌟 予約されている次回の自動セグメント切り替えタイマーをクリアする
        if (AppState.segmentTimerId) {
            clearTimeout(AppState.segmentTimerId);
            AppState.segmentTimerId = null;
        }

        stopElapsedTimeDisplay();
        stopPseudoSleepCycle();

        // 🌟 Wake Lockはこの時点ではまだ解放しない。
        //   「音声確定・文字起こし」の両方が終わるまではスリープを防ぎ続けたい
        //   ため、解放タイミングは処理の後ろ（finally節）へ置いている。
        //   （ダークトーン表示は録音中の見た目のためのものなので、ここで解除してよい）
        document.body.classList.remove('recording-active');

        UI.mainRecordBtn.disabled = true;
        UI.mainRecordBtn.classList.remove('recording');
        UI.mainRecordBtn.innerHTML = "🎤";
        UI.mainRecordBtn.style.display = "none";
        UI.statusText.innerHTML = "🎤 最後のセグメントを確定しています...";
        UI.statusText.style.color = "#4dabf7";

        try {
            // 🌟 現在進行中のセグメントを停止させ、最後のセグメントを確定させる
            await waitForRecorderToStop();

            // マイクの物理接続を完全にオフ
            if (AppState.globalStream) {
                AppState.globalStream.getTracks().forEach(track => track.stop());
                AppState.globalStream = null;
            }

            // 🌟 重要：最後のセグメントぶんの送信キュー（Drive保存＋Geminiアップロード）
            //   が完了するのを待つ
            UI.statusText.innerHTML = "✨ 最後の音声データを保存・アップロード中...";
            await AppState.audioSendQueue;

            if (!window.appController) throw new Error("現場監督のプログラムが読み込まれていません。");

            const meetingName = UI.meetingNameInput.value.trim() || "無題の会議";
            const templateType = UI.templateSelect.value;

            // ==========================================
            // 🌟 2時間超対応・案A対応：音声データの保存確認とGemini文字起こしを
            //   並行実行する。両者は完全に独立した処理（前者はDrive上の
            //   専用フォルダの状態確認、後者はGemini側に既にアップロード
            //   済みのfileUriを対象）のため、互いの成否・完了タイミングに
            //   依存しない。
            //   案Aでは音声の各セグメントはappendAudioChunkの時点で既に
            //   Driveへ保存済みのため、ここでの「確認」処理はごく軽量。
            // ==========================================
            UI.statusText.innerHTML = "🔊 音声データの保存確認とAI文字起こしを並行して進めています...（数分かかることがあります）";
            UI.progressContainer.style.display = "block";
            UI.progressTitle.innerHTML = "音声データの確認・AI文字起こし処理中...";

            const [audioSettled, transcriptSettled] = await Promise.allSettled([
                window.appController.finalizeAudioAndGetResult(meetingName),
                window.appController.transcribeFromGeminiFileUris(meetingName, templateType)
            ]);

            const audioOk = audioSettled.status === 'fulfilled';
            const transcriptOk = transcriptSettled.status === 'fulfilled' && !!transcriptSettled.value;

            if (!audioOk) {
                console.error("❌ 音声確定処理が失敗しました:", audioSettled.reason);
            }
            if (!transcriptOk) {
                console.error(
                    "❌ 文字起こし処理が失敗しました:",
                    transcriptSettled.status === 'rejected' ? transcriptSettled.reason : "(結果なし)"
                );
            }

            // 🌟 両方失敗した場合のみ、ここで処理を止めて明確にエラーを伝える。
            //   ただし案Aでは、音声の各セグメントはappendAudioChunkの時点で
            //   既にDrive上の専用フォルダへ直接保存されているため、
            //   「音声確定（finalizeAudioAndGetResult）」の失敗は、単に
            //   フォルダの存在確認通信が失敗しただけであり、音声データ
            //   自体が失われたことを意味しない。
            if (!audioOk && !transcriptOk) {
                UI.progressTitle.innerHTML = "⚠️ 音声確認・文字起こしの両方に失敗しました";
                UI.statusText.innerHTML = "エラー発生（お助けモードを確認してください）";
                UI.statusText.style.color = "#fa5252";
                alert(
                    "音声データの確認と、AI文字起こしの両方に失敗しました。\n" +
                    "録音の各セグメントは、録音中にドライブの「レコーダー/音声データ」フォルダ内の" +
                    "会議名のついた専用フォルダへ、既に個別保存されている可能性が高いです。" +
                    "お手数ですが、まずはそちらをご確認いただくか、「手動再開」からお試しください。\n\n" +
                    "音声確認エラー: " + (audioOk ? "なし" : audioSettled.reason.message) + "\n" +
                    "文字起こしエラー: " + (transcriptOk ? "なし" : (transcriptSettled.reason ? transcriptSettled.reason.message : "不明"))
                );
                return;
            }

            if (!audioOk) {
                // 🌟 音声確認だけ失敗。文字起こし・議事録は既に完成しているため、
                //   その旨を伝える。案Aでは音声原本自体は録音中に既に
                //   保存済みのため、ここでの失敗は「フォルダの状態確認通信」の
                //   失敗であり、音声データの消失を意味しない。
                alert(
                    "⚠️ 音声データの状態確認に失敗しましたが、文字起こし・議事録の生成は完了しました。\n" +
                    "音声原本は録音中にドライブへ既に保存されているはずです。確認が必要な場合は" +
                    "「手動再開」をお試しいただくか、ドライブの「レコーダー/音声データ」フォルダ内の" +
                    "専用フォルダをご確認ください。"
                );
            }

            if (!transcriptOk) {
                // 🌟 文字起こしだけ失敗。音声は確定済みのため、後から
                //   「手動再開」で文字起こし・議事録を作り直せる。
                UI.progressTitle.innerHTML = "🔊 音声データの保存は完了しています";
                UI.statusText.innerHTML = "タップして新しい録音を開始";
                UI.statusText.style.color = "#868e96";
                UI.mainRecordBtn.style.display = "flex";
                alert(
                    "🔊 音声データの保存は確認できました！\n" +
                    "ただし、AI文字起こし・議事録の生成には失敗しました。\n" +
                    "「手動再開」から文字起こしを再度お試しいただけます。"
                );
                return;
            }

            // 🌟 ここに到達するのは、音声確認・文字起こしの両方が成功したケース
            const result = transcriptSettled.value;

            UI.progressTitle.innerHTML = "🎉 処理が完了しました！";
            UI.statusText.innerHTML = "タップして新しい録音を開始";
            UI.statusText.style.color = "#868e96";
            UI.mainRecordBtn.style.display = "flex";

            if (result.audioWarning) {
                alert("⚠️ 録音中に音声の一部保存でエラーが発生した可能性があります。音声データをご確認ください。");
            }

            if (result.transcriptionWarning) {
                alert(
                    "⚠️ 録音中に一部区間のAIアップロードが失敗していたため、その区間の内容は" +
                    "文字起こし・議事録に反映されていません。（該当区間: セグメント " +
                    (result.missingChunkIndexes || []).join(", ") + "）\n" +
                    "該当区間の音声原本はドライブに保存されていますので、必要に応じてご確認ください。"
                );
            }

            if (result.documentUrl) {
                if (confirm("議事録と統合音声が完成しました！議事録ドキュメントを開きますか？")) {
                    window.open(result.documentUrl, "_blank");
                }
            } else if (result.transcriptUrl) {
                if (confirm("文字起こしと統合音声が完成しました！文字起こしドキュメントを開きますか？")) {
                    window.open(result.transcriptUrl, "_blank");
                }
            } else {
                alert("音声の保存が完了しました！(ドライブの「レコーダー」フォルダを確認してください)");
            }

        } catch (err) {
            // 🌟 このcatchに到達するのは、上記のPromise.allSettledの枠外で
            //   想定外の例外が起きたケース。
            alert("エラーが発生しました: " + err.message + "\n（音声データは既に確定保存されている可能性があります）");
            UI.statusText.innerHTML = "エラー発生（お助けモードを確認してください）";
            UI.statusText.style.color = "#fa5252";
        } finally {
            // 🌟 念のための保険：異常終了時もWake Lock・ダークトーン・疑似スリープを確実に解除する
            stopPseudoSleepCycle();
            releaseWakeLock();
            document.body.classList.remove('recording-active');

            UI.mainRecordBtn.style.display = "flex";
            UI.mainRecordBtn.disabled = false;
            AppState.isStopping = false;
        }
    }

    // 🌟 MediaRecorder.stop() を確実に待つヘルパー
    //
    // 🛠 2時間超対応版での注意点：
    //   この関数は「現在進行中のセグメント（AppState.recorderが指す
    //   インスタンス）」を停止させ、そのonstopハンドラ（startNewSegment
    //   内で定義）の完了を待つ。
    //   呼び出し前提として、AppState.isSegmentCycleActiveが既にfalseに
    //   設定されていること（stopRecordingAndProcessで設定済み）。
    //   これにより、onstopハンドラ内で「次のセグメントを自動開始する」
    //   連鎖が発生しないことが保証された状態で、最後のセグメントの
    //   確定だけを待てる。
    function waitForRecorderToStop() {
        return new Promise((resolve) => {
            if (!AppState.recorder || AppState.recorder.state !== "recording") {
                resolve();
                return;
            }

            let settled = false;
            const finalize = () => {
                if (settled) return;
                settled = true;
                AppState._onRecorderStopped = null;
                resolve();
            };

            AppState._onRecorderStopped = finalize;
            AppState.recorder.stop(); // 🌟 これによりondataavailableが発火してからonstopが呼ばれる

            // 保険：万一onstopが発火しない異常系でも最大5秒でタイムアウト
            setTimeout(finalize, 5000);
        });
    }

    // ==========================================
    // ⏱️ 経過時間表示（長時間録音の目安用）
    // ==========================================
    function startElapsedTimeDisplay() {
        updateElapsedTimeText();
        AppState.elapsedTimerId = setInterval(updateElapsedTimeText, 1000);
    }
    function stopElapsedTimeDisplay() {
        if (AppState.elapsedTimerId) {
            clearInterval(AppState.elapsedTimerId);
            AppState.elapsedTimerId = null;
        }
        UI.elapsedTime.textContent = "";
    }
    function updateElapsedTimeText() {
        if (!AppState.recordingStartedAt) return;
        const sec = Math.floor((Date.now() - AppState.recordingStartedAt) / 1000);
        const h = String(Math.floor(sec / 3600)).padStart(2, '0');
        const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        UI.elapsedTime.textContent = `経過時間 ${h}:${m}:${s}`;

        // 🌟 疑似スリープ表示中も経過時間だけは薄く更新し続ける
        if (AppState.isPseudoSleeping) {
            updateSleepOverlayElapsedText();
        }
    }

    function blobToBase64(blob) {
        return new Promise((resolve, _) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(blob);
        });
    }

    // ⚠️ 非推奨（バグ修正・方式変更）：
    //   チャンク単位の個別文字起こし（processAllChunks）用の進捗表示関数。
    //   通常フローからは呼ばれなくなったが、後方互換のため残している。
    function updateProgressUI(chunks) {
        chunks.forEach(chunk => {
            const dot = document.getElementById(`dot-${chunk.id}`);
            if (dot) {
                dot.className = 'dot';
                if (chunk.status === 'processing') dot.classList.add('processing');
                else if (chunk.status === 'completed') dot.classList.add('complete');
                else if (chunk.status === 'error') dot.classList.add('error');
            }
        });
    }

    bindEvents();
</script>
</body>
</html>
