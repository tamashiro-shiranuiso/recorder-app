<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レコーダーアプリ (UIプレビュー)</title>
    <style>
        /* ベース設定：温かみのあるオフホワイト背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #495057;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
        }

        /* メインカード：超角丸と柔らかなシャドウ */
        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            min-height: 100dvh;
            padding: 40px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 500px) {
            .app-container {
                min-height: auto;
                height: 90vh;
                border-radius: 32px;
                overflow-y: auto;
            }
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h2 {
            margin: 0;
            font-size: 24px;
            color: #212529;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        /* ヘッダー右側のボタングループを横並びにする */
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-icon {
            background: #f1f3f5;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-icon:hover { background: #e9ecef; transform: scale(1.05); }

        /* 分かりやすいテキスト付きのリカバリーボタン */
        .btn-pill {
            background: #fff;
            border: 2px solid #e9ecef;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            color: #495057;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-pill:hover {
            border-color: #fab005;
            color: #fab005;
            background: #fff9db;
        }

        /* 入力フォーム：優しく丸いデザイン */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #868e96;
        }
        input[type="text"], select {
            width: 100%;
            padding: 16px;
            border: 2px solid #f1f3f5;
            border-radius: 16px;
            font-size: 16px;
            color: #495057;
            background-color: #f8f9fa;
            transition: all 0.2s ease;
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus, select:focus {
            border-color: #74c0fc;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(116, 192, 252, 0.15);
        }

        /* 主役：巨大な録音ボタン */
        .record-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 40px 0;
        }
        .record-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #74c0fc, #4dabf7);
            color: white;
            font-size: 48px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(77, 171, 247, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .record-btn:active {
            transform: scale(0.9);
        }
        
        /* 録音中のパルスアニメーション（ベリーレッド） */
        .record-btn.recording {
            background: linear-gradient(135deg, #ff8787, #fa5252);
            box-shadow: 0 0 0 0 rgba(250, 82, 82, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(250, 82, 82, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(250, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 82, 82, 0); }
        }

        .status-text {
            margin-top: 24px;
            font-size: 16px;
            font-weight: 600;
            color: #868e96;
            text-align: center;
            min-height: 24px;
        }

        /* 並列処理の進捗たまご（ドット） */
        .progress-container {
            display: none;
            background-color: #f8f9fa;
            padding: 24px;
            border-radius: 20px;
            margin-top: 20px;
        }
        .progress-title {
            font-size: 14px;
            font-weight: 700;
            color: #495057;
            margin-bottom: 16px;
            text-align: center;
        }
        .dots-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: #dee2e6;
            transition: all 0.4s ease;
        }
        /* 処理中（青） */
        .dot.processing {
            background-color: #4dabf7;
            box-shadow: 0 0 8px rgba(77, 171, 247, 0.6);
            animation: bounce 1s infinite alternate;
        }
        /* 完了（緑） */
        .dot.complete {
            background-color: #40c057;
            transform: scale(1.1);
        }
        /* エラー（オレンジ） */
        .dot.error {
            background-color: #fab005;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }

        /* 手動リカバリーパネル（グラスモフィズム） */
        .recovery-panel {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 20px;
        }
        .recovery-panel h4 { margin: 0 0 10px 0; color: #fab005; font-size: 15px; }
        .recovery-btn {
            width: 100%; padding: 14px; margin-top: 10px;
            background-color: #fff; border: 2px solid #f1f3f5;
            border-radius: 12px; font-weight: bold; color: #495057;
            cursor: pointer; transition: all 0.2s;
        }
        .recovery-btn:hover { border-color: #fab005; color: #fab005; }
        
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>🎙 レコーダー</h2>
        <!-- 修正したヘッダー右側の横並びボタングループ -->
        <div class="header-actions">
            <!-- テキスト付きの手動再開ボタン -->
            <button class="btn-pill" title="手動で途中から再開する" id="showRecoveryBtn">
                <span>🛠</span> 手動再開
            </button>
            <!-- 設定ボタン -->
            <button class="btn-icon" title="設定">⚙️</button>
        </div>
    </div>

    <div class="input-group">
        <label>会議名・内容 (ファイル名)</label>
        <input type="text" placeholder="例：〇〇様 担当者会議">
    </div>

    <div class="input-group">
        <label>AI処理モード</label>
        <select id="modeSelect">
            <option value="1">① 録音保存のみ</option>
            <option value="2">② 録音 ＋ AI文字起こし</option>
            <option value="3" selected>③ 録音 ＋ 文字起こし ＋ 議事録生成</option>
        </select>
    </div>

    <div class="input-group fade-in" id="templateGroup">
        <label>議事録テンプレート</label>
        <select>
            <option>汎用議事録</option>
            <option>サービス担当者会議録</option>
            <option>苦情・要望等受付</option>
        </select>
    </div>

    <div class="record-area">
        <button class="record-btn" id="mainRecordBtn">🎤</button>
        <div class="status-text" id="statusText">タップして録音を開始</div>
    </div>

    <!-- 並列処理の進捗たまご -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-title" id="progressTitle">AIが音声を処理中...</div>
        <div class="dots-grid" id="dotsGrid">
            <!-- 12個のドットをJavaScriptで生成します -->
        </div>
    </div>

    <!-- お助けモード（リカバリー）パネル -->
    <div class="recovery-panel" id="recoveryPanel">
        <h4>🛠 お助けモード（手動再開）</h4>
        <input type="text" placeholder="Googleドライブの音声リンクを貼る">
        <button class="recovery-btn">この音声から文字起こしを再開</button>
    </div>
</div>

<script>
    // --- UIの動きを確認するためのダミープログラ厶 ---
    const modeSelect = document.getElementById('modeSelect');
    const templateGroup = document.getElementById('templateGroup');
    const mainRecordBtn = document.getElementById('mainRecordBtn');
    const statusText = document.getElementById('statusText');
    const progressContainer = document.getElementById('progressContainer');
    const dotsGrid = document.getElementById('dotsGrid');
    const showRecoveryBtn = document.getElementById('showRecoveryBtn');
    const recoveryPanel = document.getElementById('recoveryPanel');

    let isRecording = false;

    // モード切替でテンプレートを隠す/出す
    modeSelect.addEventListener('change', (e) => {
        if(e.target.value === "3") {
            templateGroup.style.display = "block";
            templateGroup.classList.add('fade-in');
        } else {
            templateGroup.style.display = "none";
        }
    });

    // リカバリーパネルの開閉
    showRecoveryBtn.addEventListener('click', () => {
        recoveryPanel.style.display = recoveryPanel.style.display === 'block' ? 'none' : 'block';
        if(recoveryPanel.style.display === 'block') {
            recoveryPanel.classList.add('fade-in');
        }
    });

    // ドットを12個生成
    for (let i = 0; i < 12; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.id = `dot-${i}`;
        dotsGrid.appendChild(dot);
    }

    // 主役ボタンのクリック挙動（録音開始 → 停止・処理開始）
    mainRecordBtn.addEventListener('click', () => {
        if (!isRecording) {
            // 録音開始の動き
            isRecording = true;
            mainRecordBtn.classList.add('recording');
            mainRecordBtn.innerHTML = "⏹"; // 停止アイコン
            statusText.innerHTML = "🔴 録音中... (タップして終了)";
            statusText.style.color = "#fa5252";
            progressContainer.style.display = "none";
            
            // ドットをリセット
            document.querySelectorAll('.dot').forEach(d => d.className = 'dot');
        } else {
            // 録音停止・処理開始の動き
            isRecording = false;
            mainRecordBtn.classList.remove('recording');
            mainRecordBtn.innerHTML = "🎤";
            mainRecordBtn.style.display = "none"; // ボタンを隠して処理に集中させる
            statusText.innerHTML = "✨ データを分割してAIに送信中...";
            statusText.style.color = "#4dabf7";
            
            progressContainer.style.display = "block";
            progressContainer.classList.add('fade-in');
            
            // 進捗ドットのデモアニメーション
            simulateProgress();
        }
    });

    function simulateProgress() {
        const dots = document.querySelectorAll('.dot');
        // 全部青色（処理中）にする
        dots.forEach(d => d.classList.add('processing'));
        
        // ランダムなタイミングで緑色（完了）に変えていく
        dots.forEach((d, index) => {
            const randomTime = Math.floor(Math.random() * 3000) + 1000 * (index / 2);
            setTimeout(() => {
                d.classList.remove('processing');
                d.classList.add('complete');
                
                // ひとつだけエラーを混ぜてみる（5番目）
                if(index === 5) {
                    d.classList.remove('complete');
                    d.classList.add('error');
                    setTimeout(() => { 
                        // 自動リトライで治った演出
                        d.classList.remove('error'); 
                        d.classList.add('processing'); 
                        setTimeout(() => { d.classList.remove('processing'); d.classList.add('complete'); }, 1500);
                    }, 2000);
                }
            }, randomTime);
        });

        // 全部終わった風の演出
        setTimeout(() => {
            document.getElementById('progressTitle').innerHTML = "📝 議事録を作成中...";
            setTimeout(() => {
                document.getElementById('progressTitle').innerHTML = "🎉 完了しました！";
                mainRecordBtn.style.display = "flex"; // ボタン復活
                statusText.innerHTML = "タップして新しい録音を開始";
                statusText.style.color = "#868e96";
            }, 3000);
        }, 6000);
    }
</script>
</body>
</html>

<script src="./js/recorder-controller.js"></script>
